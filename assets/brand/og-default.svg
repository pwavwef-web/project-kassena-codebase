<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Project Kasena — a language should not disappear from the future">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c172a"/>
      <stop offset="55%" stop-color="#16304f"/>
      <stop offset="100%" stop-color="#143123"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#d69b00" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d69b00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c847"/>
      <stop offset="60%" stop-color="#d69b00"/>
      <stop offset="100%" stop-color="#d87a55"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle sirigu-inspired grid -->
  <g stroke="#fbf7ee" stroke-opacity="0.05" stroke-width="1.5">
    <path d="M0 160 L1200 160 M0 320 L1200 320 M0 480 L1200 480"/>
    <path d="M300 0 L300 630 M600 0 L600 630 M900 0 L900 630"/>
  </g>

  <!-- node-branch mark -->
  <g transform="translate(96,96)">
    <rect width="88" height="88" rx="24" fill="#1e365d"/>
    <g stroke="#d69b00" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M44 68 L44 46"/>
      <path d="M44 50 L26 34"/>
      <path d="M44 50 L62 34"/>
      <path d="M44 46 L44 28"/>
    </g>
    <circle cx="44" cy="68" r="5" fill="#fbf7ee"/>
    <circle cx="26" cy="34" r="6" fill="#d69b00"/>
    <circle cx="62" cy="34" r="6" fill="#d87a55"/>
    <circle cx="44" cy="26" r="6" fill="#7bbb91"/>
  </g>
  <text x="206" y="132" font-family="Sora, Inter, sans-serif" font-size="26" letter-spacing="6" fill="#cdb27a" font-weight="600">PROJECT</text>
  <text x="206" y="170" font-family="Sora, Inter, sans-serif" font-size="40" fill="#fbf7ee" font-weight="700">Kasena</text>

  <!-- headline -->
  <text x="96" y="330" font-family="Sora, Inter, sans-serif" font-size="68" font-weight="700" fill="#fbf7ee">A language should not</text>
  <text x="96" y="408" font-family="Sora, Inter, sans-serif" font-size="68" font-weight="700" fill="url(#accent)">disappear from the future.</text>

  <text x="96" y="486" font-family="Inter, sans-serif" font-size="28" fill="#d8ecdd" opacity="0.82">Digital language infrastructure, verified datasets, and future</text>
  <text x="96" y="524" font-family="Inter, sans-serif" font-size="28" fill="#d8ecdd" opacity="0.82">AI for Kasem — built with and owned by the community.</text>

  <!-- status chips -->
  <g font-family="Inter, sans-serif" font-size="20" fill="#fbf7ee">
    <g>
      <rect x="96" y="556" width="220" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="120" cy="578" r="5" fill="#7bbb91"/>
      <text x="136" y="585">Community-powered</text>
    </g>
    <g>
      <rect x="332" y="556" width="180" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="356" cy="578" r="5" fill="#d69b00"/>
      <text x="372" y="585">Elder-validated</text>
    </g>
    <g>
      <rect x="528" y="556" width="128" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="552" cy="578" r="5" fill="#d87a55"/>
      <text x="568" y="585">AI-ready</text>
    </g>
  </g>

  <!-- network motif on the right -->
  <g transform="translate(900,250)" opacity="0.9">
    <g stroke="url(#accent)" stroke-width="2" stroke-opacity="0.5">
      <line x1="120" y1="120" x2="20" y2="20"/>
      <line x1="120" y1="120" x2="220" y2="40"/>
      <line x1="120" y1="120" x2="40" y2="220"/>
      <line x1="120" y1="120" x2="230" y2="200"/>
      <line x1="120" y1="120" x2="120" y2="-20"/>
    </g>
    <circle cx="120" cy="120" r="14" fill="#d69b00"/>
    <circle cx="20" cy="20" r="8" fill="#7bbb91"/>
    <circle cx="220" cy="40" r="8" fill="#fbf7ee"/>
    <circle cx="40" cy="220" r="8" fill="#d87a55"/>
    <circle cx="230" cy="200" r="8" fill="#7bbb91"/>
    <circle cx="120" cy="-20" r="8" fill="#fbf7ee"/>
  </g>
</svg>
